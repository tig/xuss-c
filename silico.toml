[product]
name = "Xuss-C"
fw_name = "XUSSC"
fw_version = "0.0.1"

[runtime]
language = "c"
toolchain = "esp-idf"
# Pin when the product freezes an IDF release (agent + doctor).
esp_idf = "v5.3.2"
board = "esp32"
chip = "esp32"
baud = 115200

[host]
gate = "cmake --build build/host --target host_test"
product_defaults = "include/gcu/defaults.h"

[hal]
# Only these stems may #include freertos / esp_* / driver headers.
allow_device_headers = ["hal_board"]

[deploy]
mode = "idf-flash"
project = "firmware"
